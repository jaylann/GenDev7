version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    environment:
      - PYTHON_ENV=production
      - REDIS_URL=redis://redis:6379/0
    # health-check to let nginx wait until Gunicorn is ready
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"  # enable when you add SSL
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # by default redis listens on 0.0.0.0:6379 inside the network
    # no need to publish it externally unless you want to debug from host
