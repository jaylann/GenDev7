name: Python Tests

# 1. Run on pushes and PRs to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. Grant the GITHUB_TOKEN minimal needed permissions
permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      # 3. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. Copy your example env into a real .env so pydantic BaseSettings will load it
      - name: Copy .env.example to .env
        run: cp .env.example .env

      # 5. Install uv (if you use uv instead of pip)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.2"

      # 6. Provision Python per your project’s config
      - name: Setup Python
        run: uv python install

      # 7. Sync dependencies (including pytest as dev dep)
      - name: Install dependencies
        run: uv sync --locked --dev

      # 8. Ensure src/ is on PYTHONPATH (optional if using pytest.ini)
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/src" >> $GITHUB_ENV

      # 9. Run pytest quietly, output JUnit XML
      - name: Run tests
        run: uv run pytest -q --junit-xml=test-results.xml

      # 10. Publish test results inline via check runs
      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
